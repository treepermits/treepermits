name: Scrape Miami tree decisions

on:
  schedule:
    # Times are UTC. ~7am and ~7pm Miami time.
    - cron: "0 11 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:        # manual "Run workflow" button
  push:
    branches: [ main ]      # rebuild when you push changes

permissions:
  contents: write           # allows committing the regenerated docs/index.html

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper (writes docs/index.html)
        run: python build_site.py

      - name: Show what was generated (for debugging)
        run: |
          echo "=== first 25 lines of docs/index.html ==="
          head -n 25 docs/index.html
          echo "=== row count ==="
          grep -c '<tr class' docs/index.html || true

      - name: Commit updated page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/index.html docs/decisions.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update tree decisions ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
